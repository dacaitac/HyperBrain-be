spring:
  application:
    name: HyperBrain-be
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres-service:5432/sopfc}
    username: ${SPRING_DATASOURCE_USERNAME:user}
    password: ${SPRING_DATASOURCE_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
  flyway:
    baseline-on-migrate: true
    enabled: true
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

notion:
  token: ${NOTION_TOKEN:dummy-token}
  version: "2022-06-28"
  database-ids:
    tasks: ${NOTION_TASKS_DB_ID:dummy-db-id}

apple:
  sentinel:
    url: ${APPLE_SENTINEL_URL:http://127.0.0.1:1995}

logging:
  level:
    org.springframework.web: DEBUG
    com.hyperbrain.sopfc.sync: INFO

server:
  port: 8080

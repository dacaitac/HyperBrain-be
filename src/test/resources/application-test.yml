spring:
  datasource:
    url: "jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;INIT=CREATE SCHEMA IF NOT EXISTS core\\;CREATE SCHEMA IF NOT EXISTS sync\\;CREATE SCHEMA IF NOT EXISTS common\\;CREATE SCHEMA IF NOT EXISTS finance"
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        default_schema: public
  flyway:
    enabled: false

app:
  outbox:
    enabled: false

logging:
  level:
    com.hyperbrain.sopfc: DEBUG
    org.springframework.web.reactive.function.client.WebClient: DEBUG

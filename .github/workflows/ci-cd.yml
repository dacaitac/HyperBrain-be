name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log Configured Secrets (Names Only)
        run: |
          echo "Verificando configuración de secretos:"
          [ -n "${{ secrets.DOCKER_USERNAME }}" ] && echo "- DOCKER_USERNAME: Configurado" || echo "- DOCKER_USERNAME: FALTANTE"
          [ -n "${{ secrets.DOCKER_PASSWORD }}" ] && echo "- DOCKER_PASSWORD: Configurado" || echo "- DOCKER_PASSWORD: FALTANTE"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            dacaitac/hyperbrain-be:${{ github.sha }}
            dacaitac/hyperbrain-be:latest

name: Professional CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  validate-and-build:
    name: Validate, Test and Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'
          cache: 'gradle'
          
      - name: Build with Gradle
        run: ./gradlew clean build -x test

  dockerize:
    name: Build & Push Docker Image
    needs: validate-and-build
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          
      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            dacaitac/hyperbrain-be:${{ github.sha }}
            dacaitac/hyperbrain-be:latest

  deploy:
    name: Deploy to Production (Daniel-Ubuntu)
    needs: dockerize
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Connect to Tailscale VPN
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Execute Deployment via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: daniel-ubuntu.tail95d990.ts.net # FQDN completo de la VPN
          username: danielc
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "Hn5n7u9i6n" | sudo -S kubectl rollout restart deployment/backend -n hyperbrain
            echo "🚀 Deployment restarted. Waiting for status..."
            echo "Hn5n7u9i6n" | sudo -S kubectl rollout status deployment/backend -n hyperbrain
            echo "Hn5n7u9i6n" | sudo -S kubectl get pods -n hyperbrain
